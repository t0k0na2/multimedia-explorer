<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: black;
            font-family: sans-serif;
            font-size: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            display: none;
        }
    </style>
    <!-- Import map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
    <div id="loading">読み込み中...</div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        let camera, scene, renderer, controls, currentModel;
        const loadingElement = document.getElementById('loading');

        init();
        animate();

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            // Optional: Background color
            scene.background = null; // transparent to show overlay effect if possible

            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            // tone map and encoding for better gltf look
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            // Window Resize Handle
            window.addEventListener('resize', onWindowResize);

            // Communicate with C# Host
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', event => {
                    let msg = event.data;
                    if (typeof msg === 'string') {
                        try { msg = JSON.parse(msg); } catch (e) { }
                    }
                    console.log(msg);
                    if (msg.action === 'load') {
                        console.log("load action: " + msg.action);
                        loadModel(msg.url, msg.extension);
                    } else if (msg.action === 'clear') {
                        console.log("clear action: " + msg.action);
                        clearModel();
                    }
                    else {
                        console.log("Unknown action: " + msg.action);
                    }
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function clearModel() {
            if (currentModel) {
                scene.remove(currentModel);
                // traverse and dispose geometries/materials
                currentModel.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        if (child.material.isMaterial) {
                            cleanMaterial(child.material);
                        } else if (Array.isArray(child.material)) {
                            child.material.forEach(cleanMaterial);
                        }
                    }
                });
                currentModel = null;
            }
            loadingElement.style.display = 'none';
            // reset camera
            camera.position.set(0, 2, 5);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        function cleanMaterial(material) {
            material.dispose();
            if (material.map) material.map.dispose();
            if (material.lightMap) material.lightMap.dispose();
            if (material.bumpMap) material.bumpMap.dispose();
            if (material.normalMap) material.normalMap.dispose();
            if (material.specularMap) material.specularMap.dispose();
            if (material.envMap) material.envMap.dispose();
        }

        function loadModel(url, extension) {
            console.log("Loading model: " + url);
            clearModel();
            loadingElement.style.display = 'block';

            let loader;
            const ext = extension.toLowerCase();

            if (ext === '.gltf' || ext === '.glb') {
                loader = new GLTFLoader();
            } else if (ext === '.fbx') {
                loader = new FBXLoader();
            } else if (ext === '.obj') {
                loader = new OBJLoader();
            } else {
                console.error("Unsupported format: " + ext);
                loadingElement.innerText = "未対応のプレビューフォーマットです";
                return;
            }

            console.log("Loading model: " + url);
            loader.load(
                url, // model url
                (object) => { // onLoad
                    loadingElement.style.display = 'none';
                    loadingElement.innerText = "読み込み中...";

                    // Center and scale the model
                    let root = (ext === '.gltf' || ext === '.glb') ? object.scene : object;

                    const box = new THREE.Box3().setFromObject(root);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    // Offset the root to center its bounding box at the origin
                    root.position.x -= center.x;
                    root.position.y -= center.y;
                    root.position.z -= center.z;

                    // Use a wrapper group to scale the centered model
                    const wrapper = new THREE.Group();
                    wrapper.add(root);

                    // auto scale
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const defaultSize = 3;
                    if (maxDim > 0) {
                        const scale = defaultSize / maxDim;
                        wrapper.scale.set(scale, scale, scale);
                    }

                    scene.add(wrapper);
                    currentModel = wrapper;

                    // reset camera near object
                    controls.target.set(0, 0, 0);
                    camera.position.set(0, defaultSize * 0.3, defaultSize * 1.5);
                    controls.update();
                },
                (xhr) => { // onProgress
                    const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                    if (Number.isFinite(percent)) {
                        loadingElement.innerText = `読み込み中... ${percent}%`;
                    } else {
                        loadingElement.innerText = `読み込み中...`;
                    }
                },
                (error) => { // onError
                    console.error('An error happened', error);
                    loadingElement.style.display = 'block';
                    loadingElement.innerText = "読み込みエラー";
                }
            );
        }
    </script>
</body>

</html>
